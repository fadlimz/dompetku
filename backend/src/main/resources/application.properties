spring.application.name=dompetku

# Server Configuration
server.port=${SERVER_PORT:7860}

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dompetku?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# JWT Configuration
# Default secret is 256 bits (base64 encoded). For production, set JWT_SECRET env var!
jwt.secret=${JWT_SECRET:jJCy7taki3X2w+oxpn24LSHOmGKxx6dnjG4Yv+PvGEM=}
