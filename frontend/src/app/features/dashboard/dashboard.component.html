<!-- Welcome Card -->
<div class="bg-white rounded-2xl shadow-sm p-4 md:p-6 mb-4 md:mb-6">
  <h3 class="text-base md:text-xl font-semibold text-gray-800 mb-1 md:mb-2">Selamat Datang di Dompetku! 👋</h3>
  <p class="text-sm text-gray-500">Kelola keuangan pribadi Anda dengan mudah dan terorganisir.</p>
</div>

<!-- Stats Grid -->
<div class="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-6 mb-4 md:mb-6">
  <!-- Saldo - colspan 2 di mobile -->
  <div class="col-span-2 md:col-span-1 bg-white rounded-2xl shadow-sm p-3 md:p-6">
    <div class="flex items-center gap-2 md:gap-4">
      <div class="w-10 h-10 md:w-12 md:h-12 bg-blue-100 rounded-lg md:rounded-xl flex items-center justify-center text-lg md:text-2xl">💵</div>
      <div>
        <h4 class="text-xs md:text-sm text-gray-500">Saldo</h4>
        <p class="text-base md:text-xl font-bold text-blue-600">Rp 0</p>
      </div>
    </div>
  </div>

  <!-- Pemasukan -->
  <div class="bg-white rounded-2xl shadow-sm p-3 md:p-6">
    <div class="flex items-center gap-2 md:gap-4">
      <div class="w-10 h-10 md:w-12 md:h-12 bg-green-100 rounded-lg md:rounded-xl flex items-center justify-center text-lg md:text-2xl">📈</div>
      <div>
        <h4 class="text-xs md:text-sm text-gray-500">Pemasukan</h4>
        <p class="text-base md:text-xl font-bold text-green-600">Rp 0</p>
      </div>
    </div>
  </div>

  <!-- Pengeluaran -->
  <div class="bg-white rounded-2xl shadow-sm p-3 md:p-6">
    <div class="flex items-center gap-2 md:gap-4">
      <div class="w-10 h-10 md:w-12 md:h-12 bg-red-100 rounded-lg md:rounded-xl flex items-center justify-center text-lg md:text-2xl">📉</div>
      <div>
        <h4 class="text-xs md:text-sm text-gray-500">Pengeluaran</h4>
        <p class="text-base md:text-xl font-bold text-red-600">Rp 0</p>
      </div>
    </div>
  </div>
</div>

<!-- Quick Actions -->
<div class="bg-white rounded-2xl shadow-sm p-4 md:p-6">
  <h3 class="text-base md:text-lg font-semibold text-gray-800 mb-3 md:mb-4">Aksi Cepat</h3>
  <div class="flex flex-col md:flex-row flex-wrap gap-2 md:gap-4">
    <button routerLink="/transactions" class="flex items-center justify-center gap-2 px-4 md:px-5 py-2 md:py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors text-sm md:text-base">
      <span>➕</span>
      <span>Transaksi Baru</span>
    </button>
    <button routerLink="/accounts" class="flex items-center justify-center gap-2 px-4 md:px-5 py-2 md:py-3 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 rounded-lg transition-colors text-sm md:text-base">
      <span>💳</span>
      <span>Akun Baru</span>
    </button>
    <button routerLink="/categories" class="flex items-center justify-center gap-2 px-4 md:px-5 py-2 md:py-3 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 rounded-lg transition-colors text-sm md:text-base">
      <span>🏷️</span>
      <span>Kategori Baru</span>
    </button>
  </div>
</div>
