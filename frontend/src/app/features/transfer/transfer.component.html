<div class="p-4 md:p-6 max-w-2xl mx-auto pb-20">
  <!-- Page Header -->
  <div class="mb-6">
    <h2 class="text-xl md:text-2xl font-semibold text-gray-800">
      {{ isEditMode ? 'Edit Transfer Saldo' : 'Transfer Saldo' }}
    </h2>
    <p class="text-sm text-gray-500 mt-1">
      {{ isEditMode ? 'Perbarui data transfer yang dipilih' : 'Transfer saldo dari satu akun ke akun lainnya' }}
    </p>
  </div>

  <!-- Error Message -->
  @if (submitError) {
    <div class="bg-red-50 text-red-600 border border-red-200 rounded-lg p-4 mb-6">
      {{ submitError }}
    </div>
  }

  <!-- Transfer Form -->
  <form (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- Date Input -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Tanggal Transaksi</label>
      <input
        type="date"
        [(ngModel)]="formDate"
        name="date"
        class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
      />
    </div>

    <!-- From Account and To Account (Side by Side) -->
    <div class="grid grid-cols-2 gap-4">
      <!-- From Account -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Dari Akun <span class="text-red-500">*</span></label>
        <select
          [(ngModel)]="formFromAccountId"
          name="fromAccount"
          class="w-full px-3 md:px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base">
          <option value="">Pilih Akun</option>
          @for (account of accounts; track account.id) {
            <option [value]="account.id">
              {{ account.accountName }}
            </option>
          }
        </select>
      </div>

      <!-- To Account -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Ke Akun <span class="text-red-500">*</span></label>
        <select
          [(ngModel)]="formToAccountId"
          name="toAccount"
          class="w-full px-3 md:px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base">
          <option value="">Pilih Akun</option>
          @for (account of accounts; track account.id) {
            <option [value]="account.id">
              {{ account.accountName }}
            </option>
          }
        </select>
      </div>
    </div>

    <!-- Value Input -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Nilai Transfer <span class="text-red-500">*</span></label>
      <input
        type="text"
        [(ngModel)]="formValue"
        name="value"
        placeholder="0"
        class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
      />
    </div>

    <!-- Description Input -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Keterangan <span class="text-gray-400">(Opsional)</span></label>
      <textarea
        [(ngModel)]="formDescription"
        name="description"
        rows="3"
        placeholder="Contoh: Transfer ke tabungan"
        class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
    </div>

    <div class="flex gap-3">
      @if (isEditMode) {
        <button
          type="button"
          (click)="deleteTransfer()"
          [disabled]="isSubmitting"
          class="px-4 py-3 bg-red-500 hover:bg-red-600 disabled:bg-red-300 text-white rounded-lg transition-colors font-medium">
          Hapus
        </button>
      }

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="isSubmitting"
        class="flex-1 py-3 bg-blue-500 hover:bg-blue-600 disabled:bg-blue-300 text-white rounded-lg transition-colors font-medium">
        @if (isSubmitting) {
          <span class="inline-block w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
        } @else {
          {{ isEditMode ? 'Perbarui' : 'Simpan' }}
        }
      </button>
    </div>
  </form>

  <!-- Toast Notification -->
  @if (showToast) {
    <div class="fixed top-4 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg z-[70] animate-pulse">
      {{ toastMessage }}
    </div>
  }
</div>
