<div class="p-4 md:p-6">
  <!-- Header with navigation -->
  <div class="flex items-center justify-between mb-6">
    <button (click)="previousMonth()" class="p-2 hover:bg-gray-100 rounded-lg">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </button>
    <h2 class="text-lg font-semibold">{{ currentMonthName }}</h2>
    <button (click)="nextMonth()" class="p-2 hover:bg-gray-100 rounded-lg">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

  <!-- Calendar grid -->
  <div class="grid grid-cols-7 gap-1 mb-4">
    <!-- Day headers -->
    @for (day of ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab']; track day) {
      <div class="text-center text-xs font-medium text-gray-500 py-2">{{ day }}</div>
    }
    
    <!-- Calendar days -->
    @for (day of calendarDays; track day.date) {
      <div 
        class="aspect-square p-1 text-center cursor-pointer rounded-lg hover:bg-gray-50 transition-colors"
        [class.bg-blue-50]="day.isToday"
        [class.text-gray-300]="!day.isCurrentMonth"
        [class.text-gray-800]="day.isCurrentMonth"
        (click)="selectDate(day.date)">
        <div class="text-sm">{{ day.date.getDate() }}</div>
        @if (day.hasTransaction) {
          <div class="w-1.5 h-1.5 bg-blue-500 rounded-full mx-auto mt-0.5"></div>
        }
      </div>
    }
  </div>
</div>
